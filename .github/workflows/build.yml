name: Development Build 1.0

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm \
            gcc \
            binutils \
            grub-pc-bin \
            grub-common \
            xorriso \
            mtools \
            dosfstools \
            parted \
            gzip \
            pkg-config \
            libpng-dev \
            qemu-system-x86

      - name: Build CD-ROM
        run: make

      - name: Build Disk
        run: make disk

      - name: Build Floppy
        run: make floppy

      - name: Verify Build
        run: |
          test -s build/os.iso
          test -s build/haloxos-disk.img
          test -s build/core_disk.img
          test -s build/haloxos-floppy.img
          test -s build/core_floppy.img
          echo "All builds are ready:"
          ls -lh build/os.iso build/haloxos-disk.img build/core_disk.img build/haloxos-floppy.img build/core_floppy.img